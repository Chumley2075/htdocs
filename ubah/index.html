 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Class Interface Homepage</title>
<style>
  /* page */
  body{margin: 0;font-family: Arial, Helvetica, sans-serif;background-color: #a7a77a;}
  header, footer{max-width: 1000px;margin: 16px auto;padding: 0 16px;}

  /* headings and text*/
  h1{margin: 0 0% 8px;font-size: 24px;}
  h2{margin: 8px 0 10px;font-size: 18px;}
  p{margin:10px 0;}
  
  /* buttons */
 /* button{
    
    padding:50px 150px;cursor: pointer;margin:0 8px 8px 0;font-weight: 1000;
  }
    */
/* display panel*/
#display{background: #fff;min-height: 70vh;padding: 16px;}
  .display-inner{max-width:1000px;margin:0 auto;padding: 0 16px;}

/* Placeholder for scanning face*/
#scanFace{
  display: block; width:100%; height: 360px;cursor: pointer;
  font-size: 18px;font-weight:700; 
  border:2px dashed; border-radius:8px;
}
</style>
</head>
<body>
<!-- Header-->
 <header>
<h1>Classroom Display</h1>
<p>
  <strong>Date:</strong> <time id="dateOnly">Thurs,Sep 25,2025</time>
    <strong>Time:</strong> <time id="timeOnly">6:00 PM</time>
</p>
</header>

<!--Main Content -->
<main>
<!-- display panel-->
 <section id="display" aria-labelledby="displayHeading">
  <h2 id="displayHeading">Door Display</h2>
  <p><strong>Room:</strong> <span id="roomNumber">Room 115</span></p>
  <p><strong>Current class:</strong> <span id="currentClass"> ICS 370 - Software Design Model</span></p>
  <p><strong>Window:</strong> <span id="window">6:00-9:20</span></p>
<p>
  <strong>Status:</strong> <span id="status">Available</span>
    <strong>Ends:</strong> <time id="endsAt">9:20 PM</time>
</p>

  <p>
    <button id="scanFace">Scan Face</button>
    
</main>
<!----Footer-->



<footer>
</footer>


</footer>


</body>
</html>
